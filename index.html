      /* Instant splash painted from the document itself (logo inlined as a data
         URI, so it needs ZERO extra network requests). On a cold dev start Vite
         still takes a couple of seconds to serve index.html, but once it lands
         the splash shows immediately and animates while the app bundle loads;
         main.tsx fades it out after React mounts. */
      html, body { margin: 0; height: 100%; background: #0a0a0b; }
      #app-loader {
        position: fixed; inset: 0; z-index: 2147483647;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 18px; background: #0a0a0b;
        font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, Arial, sans-serif;
        transition: opacity 0.35s ease;
      }
      #app-loader.al-hide { opacity: 0; pointer-events: none; }
      #app-loader .al-logo { width: 84px; height: 84px; border-radius: 18px; animation: al-pulse 1.6s ease-in-out infinite; }
      #app-loader .al-title { color: #f5f5f5; font-size: 16px; font-weight: 600; letter-spacing: 0.04em; }
      #app-loader .al-spinner {
        width: 26px; height: 26px; border-radius: 50%;
        border: 2.5px solid rgba(255,255,255,0.14); border-top-color: rgba(255,255,255,0.85);
        animation: al-spin 0.8s linear infinite;
      }
      #app-loader .al-owner { position: fixed; bottom: 18px; color: #6b6b70; font-size: 11px; letter-spacing: 0.02em; }
      @keyframes al-spin { to { transform: rotate(360deg); } }
      @keyframes al-pulse { 0%,100% { opacity: 0.55; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.02); } }
      @media (prefers-reduced-motion: reduce) { #app-loader .al-logo, #app-loader .al-spinner { animation: none; } }
    </style>
